name: Deploy Canary to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GCP_PROJECT_ID: utec-posgrado-01
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/utec-posgrado-01/app-gemini-jasoncb1993

jobs:
  build_and_canary:
    runs-on: ubuntu-latest
    outputs:
      is_first_deploy: ${{ steps.check_service.outputs.is_first_deploy }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          SERVICE_NAME="gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}"
          IMAGE_TAG="${{ env.ARTIFACT_REGISTRY }}/app-${{ secrets.ALUMNO_ID }}:${{ github.sha }}"
          
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG
          
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "SERVICE_NAME=$SERVICE_NAME" >> $GITHUB_ENV

      - name: Check if Service Exists
        id: check_service
        run: |
          if gcloud run services describe ${{ env.SERVICE_NAME }} \
             --region=${{ env.GCP_REGION }} &>/dev/null; then
            echo "is_first_deploy=false" >> $GITHUB_OUTPUT
            echo "✅ Servicio existe - Deploy Canary 10%"
          else
            echo "is_first_deploy=true" >> $GITHUB_OUTPUT
            echo "🆕 Primer deploy - 100% del tráfico"
          fi

      - name: Deploy to Cloud Run (Canary or First Deploy)
        run: |
          if [ "${{ steps.check_service.outputs.is_first_deploy }}" == "true" ]; then
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image=${{ env.IMAGE_TAG }} \
              --region=${{ env.GCP_REGION }} \
              --platform=managed \
              --allow-unauthenticated \
              --tag=canary
          else
            gcloud run deploy ${{ env.SERVICE_NAME }} \
              --image=${{ env.IMAGE_TAG }} \
              --region=${{ env.GCP_REGION }} \
              --platform=managed \
              --no-traffic \
              --tag=canary
            
            LATEST_REVISION=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
              --region=${{ env.GCP_REGION }} \
              --format='value(status.latestReadyRevisionName)')
            
            STABLE_REVISION=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
              --region=${{ env.GCP_REGION }} \
              --format='value(status.traffic[0].revisionName)')
            
            gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
              --region=${{ env.GCP_REGION }} \
              --to-revisions=$LATEST_REVISION=10,$STABLE_REVISION=90
          fi

      - name: Get Service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "🌐 Service URL: $SERVICE_URL"

  promote_or_rollback:
    runs-on: ubuntu-latest
    needs: build_and_canary
    if: needs.build_and_canary.outputs.is_first_deploy == 'false'
    environment: dev
    
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Promote Canary to 100%
        run: |
          SERVICE_NAME="gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}"
          
          CANARY_REVISION=$(gcloud run services describe $SERVICE_NAME \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.latestReadyRevisionName)')
          
          gcloud run services update-traffic $SERVICE_NAME \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=$CANARY_REVISION=100
          
          echo "✅ Canary promovido al 100% del tráfico"

  rollback_canary:
    runs-on: ubuntu-latest
    needs: [build_and_canary, promote_or_rollback]
    if: |
      always() && 
      needs.build_and_canary.outputs.is_first_deploy == 'false' &&
      (needs.promote_or_rollback.result == 'failure' || 
       needs.promote_or_rollback.result == 'cancelled')
    
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Rollback to Stable Version
        run: |
          SERVICE_NAME="gemini-angular-${{ secrets.ALUMNO_ID }}-${{ secrets.ENVIRONMENT_NAME }}"
          
          STABLE_REVISION=$(gcloud run services describe $SERVICE_NAME \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.traffic[0].revisionName)')
          
          gcloud run services update-traffic $SERVICE_NAME \
            --region=${{ env.GCP_REGION }} \
            --to-revisions=$STABLE_REVISION=100
          
          echo "🔄 Rollback completado - versión estable al 100%"
